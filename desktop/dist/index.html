<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TheOffice.AI</title>
  <script>
    (() => {
      const param = new URLSearchParams(window.location.search).get("scoutTheme");
      const theme =
        param || (window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light");
      document.documentElement.setAttribute("data-theme", theme);
    })();
  </script>
  <style>
    :root {
      color-scheme: light;
      --cp-bg: #f7f4ef;
      --cp-surface: #ffffff;
      --cp-border: #dedede;
      --cp-text: #242424;
      --cp-text-muted: #5c5c5c;
      --cp-accent: #b11f4b;
    }
    html[data-theme="dark"] {
      color-scheme: dark;
      --cp-bg: #3d3b3a;
      --cp-surface: #292929;
      --cp-border: #474747;
      --cp-text: #dedede;
      --cp-text-muted: #919191;
      --cp-accent: #fd8ea1;
    }
    * { box-sizing: border-box; }
    html, body { height: 100%; margin: 0; }
    body {
      background: var(--cp-bg);
      color: var(--cp-text);
      font-family: "Segoe UI", Aptos, Calibri, -apple-system, BlinkMacSystemFont, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      -webkit-user-select: none;
      user-select: none;
    }
    .card {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 18px;
      padding: 40px 56px;
      text-align: center;
    }
    .spinner {
      width: 44px;
      height: 44px;
      border-radius: 999px;
      border: 4px solid var(--cp-border);
      border-top-color: var(--cp-accent);
      animation: spin 0.9s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .title { font-size: 20px; font-weight: 600; letter-spacing: 0.2px; }
    .sub { font-size: 13px; color: var(--cp-text-muted); }
  </style>
</head>
<body>
  <div class="card">
    <div class="spinner" aria-hidden="true"></div>
    <div class="title">TheOffice.AI</div>
    <div class="sub">Starting local service…</div>
  </div>
</body>
</html>
